# 一键启动：docker compose up -d
# FastAPI 后端 + Streamlit 前端

services:
  api:
    build: .
    container_name: travel-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}   # 从 .env 文件读取
    volumes:
      - .:/app   # 代码挂载到容器，改代码即时生效（不用重 build）

  streamlit:
    build: .
    container_name: travel-streamlit
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - .:/app
    depends_on:
      - api
